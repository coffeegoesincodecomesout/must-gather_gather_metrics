kind: "Dashboard"
metadata:
  name: "cluster-overview"
  project: "default"
spec:
  display:
    name: "Cluster Overview"
    description: "OpenShift cluster metrics from must-gather"
  duration: "1h"
  refreshInterval: "0s"
  panels:
    node-ready:
      kind: "Panel"
      spec:
        display:
          name: "Node Ready Status"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "kube_node_status_condition{condition='Ready',status='true'}"
    node-info:
      kind: "Panel"
      spec:
        display:
          name: "Node Info"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "kube_node_info"
    pod-phases:
      kind: "Panel"
      spec:
        display:
          name: "Pod Phases"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "sum by (phase) (kube_pod_status_phase)"
    container-restarts:
      kind: "Panel"
      spec:
        display:
          name: "Container Restarts (rate)"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total[5m])) > 0"
    pod-not-running:
      kind: "Panel"
      spec:
        display:
          name: "Pods Not Running"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "kube_pod_status_phase{phase!~'Running|Succeeded'}"
    alerts-firing:
      kind: "Panel"
      spec:
        display:
          name: "Alerts Firing"
        plugin:
          kind: "TimeSeriesChart"
          spec:
            legend:
              position: "bottom"
        queries:
          - kind: "TimeSeriesQuery"
            spec:
              plugin:
                kind: "PrometheusTimeSeriesQuery"
                spec:
                  query: "ALERTS{alertstate='firing'}"
  layouts:
    - kind: "GridLayout"
      spec:
        display:
          title: "Nodes"
          collapse:
            open: true
        items:
          - x: 0
            y: 0
            width: 12
            height: 8
            content:
              $ref: "#/spec/panels/node-ready"
          - x: 12
            y: 0
            width: 12
            height: 8
            content:
              $ref: "#/spec/panels/node-info"
    - kind: "GridLayout"
      spec:
        display:
          title: "Workloads"
          collapse:
            open: true
        items:
          - x: 0
            y: 0
            width: 8
            height: 8
            content:
              $ref: "#/spec/panels/pod-phases"
          - x: 8
            y: 0
            width: 8
            height: 8
            content:
              $ref: "#/spec/panels/container-restarts"
          - x: 16
            y: 0
            width: 8
            height: 8
            content:
              $ref: "#/spec/panels/pod-not-running"
    - kind: "GridLayout"
      spec:
        display:
          title: "Alerts"
          collapse:
            open: true
        items:
          - x: 0
            y: 0
            width: 24
            height: 8
            content:
              $ref: "#/spec/panels/alerts-firing"
